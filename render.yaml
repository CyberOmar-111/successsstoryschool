services:
  - type: web
    name: success-story-school
    runtime: python
    buildCommand: npm ci && npm run build && python -m pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/admin/setup-status
    autoDeployTrigger: off
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 24.14.1
      - key: SSS_REQUIRE_ADMIN_SETUP_SECRET
        value: "1"
      - key: SSS_MFA_ENABLED
        value: "1"
      - key: ADMIN_SETUP_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      - key: SSS_MFA_PHONE_NUMBERS
        sync: false
